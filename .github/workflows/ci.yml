# QA contínua — Farmácia Clark
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend (Maven test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: farmacia_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d farmacia_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Unit tests
        run: mvn -B test -pl farmacia-api -am

      - name: BDD tests (Cucumber — execução real)
        env:
          BDD_DATASOURCE_URL: jdbc:postgresql://localhost:5432/farmacia_test
          BDD_DATASOURCE_USERNAME: test
          BDD_DATASOURCE_PASSWORD: test
        run: mvn -B verify -pl farmacia-api -am "-Dit.test=CucumberRunnerIT"

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: farmacia-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: farmacia-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: farmacia-web
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: farmacia_dev
          POSTGRES_USER: farmacia
          POSTGRES_PASSWORD: farmacia123
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U farmacia -d farmacia_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build API JAR
        run: mvn -B package -pl farmacia-api -am -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: farmacia-web/package-lock.json

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: 'true'
          PLAYWRIGHT_MANAGED_SERVERS: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: farmacia-web/playwright-report/
          retention-days: 7
